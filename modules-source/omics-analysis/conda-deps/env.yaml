# omics-analysis 模块的 conda 环境
#
# 设计:本模块是"可插拔分析宿主",不内置任何具体分析包(DESeq2 / clusterProfiler /
# GO.db / org.At.tair.db / WGCNA 等)。分析代码由用户上传,运行时 run_analysis.R 会
# 扫描该分析需要哪些 R 包,缺的就按需装到用户可写目录(~/.plantomics/analysis-r-libs,
# 走 USTC 镜像),装过的下次直接复用。
#
# 这样:env 极小、构建快,也彻底没有 Bioconductor 数据包 post-link 联网失败的问题。
# 代价:某个分析第一次跑、且它依赖的重包(如 DESeq2)还没装时,会先编译安装(较慢)。

channels:
  - conda-forge
  - bioconda
  - nodefaults

dependencies:
  # ── Python 后端 ──
  - python=3.11
  - fastapi
  - uvicorn
  - pydantic>=2.0
  - python-multipart
  - httpx
  - aiofiles
  - pyyaml
  - conda-pack

  # ── R 框架(只装跑框架必需的)──
  - r-base=4.4
  - r-plumber
  - r-jsonlite

  # ── 让运行时 install.packages 能编译源码包(Linux 上 R/Bioc 包多为源码安装)──
  - c-compiler
  - cxx-compiler
  - fortran-compiler
  - make
  - pkg-config
  - libxml2          # igraph / XML 等依赖链常用
  - libcurl
  - openssl
  - zlib

  - pip
