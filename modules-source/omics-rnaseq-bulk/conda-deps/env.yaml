# omics-rnaseq-bulk 模块的 conda 环境
# 包含完整的 bulk RNA-seq 分析所需工具,不依赖主程序的 env。
#
# 镜像配置由 build-deb.sh 设置,不写在这里。

channels:
  - conda-forge
  - bioconda
  - nodefaults

dependencies:
  # ───── Python(模块自己的后端)─────
  - python=3.11
  - fastapi
  - uvicorn
  - pydantic>=2.0
  - python-multipart
  - httpx
  - aiofiles
  - pyyaml
  - conda-pack

  # ───── R(本模块只跑一个 /health plumber 服务)─────
  # 差异/富集/WGCNA/画图/物种库等下游分析已迁到 omics-analysis 模块,
  # 这里不再需要 Bioconductor 那一整套(也就不会再装 GenomeInfoDbData 等数据包)。
  - r-base=4.4
  - r-plumber
  - r-jsonlite

  # ───── 上游分析工具 ─────
  - sra-tools           # fasterq-dump / prefetch
  - fastqc
  - multiqc             # 合并所有 FastQC 结果成一份 HTML 报告
  - fastp               # 质量过滤
  - star                # 比对
  - salmon              # 伪比对量化
  - subread             # featureCounts
  - gffread             # GFF→GTF 转换(主程序也用)
  - samtools
  - qualimap            # 文库质量评估(RNA-seq QC)
  - stringtie           # 转录本组装
  - gffcompare          # 转录本与参考比对(新转录本)
  - rmats               # 可变剪接(rMATS-turbo)
  - transdecoder        # 新转录本编码区(ORF)预测
  - cpc2                # lncRNA 编码潜能(CPC2)
  - libsvm              # CPC2 依赖的 svm-scale / svm-predict;bioconda 的 cpc2 常不自带可用二进制
  - plek                # lncRNA 编码潜能(PLEK)
  - htslib
  - pigz                # 并行 gzip

  # ───── (已删除)下游 Bioconductor 分析栈 ─────
  # DESeq2 / clusterProfiler / enrichplot / GenomeInfoDbData / GenomeInfoDb /
  # GenomicRanges / GenomicFeatures / Biostrings / edgeR / limma / GO.db /
  # org.At.tair.db / WGCNA / pheatmap / ggplot2 等已随下游分析迁到 omics-analysis 模块。
  # 上游(SRA→质控→过滤→比对→定量→标准化 + 文库质控/新转录本/可变剪接/lncRNA)
  # 全用命令行工具 + 纯 Python(标准化在 normalize_runner.py 里算,不用 R),
  # 所以这里整段删掉:env 更小、构建更快,也彻底避开 Bioconductor 数据包 post-link 联网失败。

  # ───── pip 兜底 ─────
  - pip
